name: flosy_fein
description: تطبيق فلوسي فين - سجلني قبل ما تاكلني - تطبيق مالي ذكي لإدارة المصاريف والميزانية.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_mobile_ads: ^9.0.0
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  intl: ^0.20.2
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10
  audioplayers: ^6.0.0
  firebase_core: ^2.24.0
  firebase_analytics: ^10.7.0
  firebase_crashlytics: ^3.4.0
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/lang/
    - assets/branding/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/app_icon.jpg"
